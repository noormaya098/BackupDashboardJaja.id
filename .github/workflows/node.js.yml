name: Frontend Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci
      - run: npx vite build

      - name: Remove old dist
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: jaja
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            rm -rf /home/jaja/dashboard.jaja.id/dist/*

      - name: Upload new dist
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: jaja
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: "dist"
          target: "/home/jaja/dashboard.jaja.id"
